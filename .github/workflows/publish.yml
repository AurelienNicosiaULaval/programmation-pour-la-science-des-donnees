name: Publish Quarto site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Check for renv lockfile
        id: renv
        shell: bash
        run: |
          if [ -f renv.lock ]; then
            echo "has_lockfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_lockfile=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up R
        if: steps.renv.outputs.has_lockfile == 'true'
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Restore R packages with renv
        if: steps.renv.outputs.has_lockfile == 'true'
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Validate internal links
        run: Rscript scripts/valider_liens.R

      - name: Render site
        run: quarto render

      - name: Upload rendered site artifact
        uses: actions/upload-artifact@v4
        with:
          name: quarto-site
          path: _site
          retention-days: 7

      - name: Deploy rendered site to gh-pages
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail

          publish_dir="$(mktemp -d)"
          cp -a _site/. "$publish_dir/"
          touch "$publish_dir/.nojekyll"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git switch --force-create gh-pages origin/gh-pages
          else
            git switch --orphan gh-pages
          fi

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf -- {} +
          cp -a "$publish_dir/." .

          git add -A
          git commit -m "Publish Quarto site" || {
            echo "No changes to publish."
            exit 0
          }
          git push origin gh-pages
